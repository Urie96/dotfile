# Rime schema
# encoding: utf-8

schema:
  schema_id: double_pinyin_flypy
  name: 小鹤双拼
  description: |
    朙月拼音＋小鶴雙拼方案。

switches:
  - name: ascii_punct # 中英标点
    states: [¥, $]
  - name: code_mode
    reset: 0
    states: ['!!', '!=']
  - name: emoji
    states: [💀, 😄]
  - name: ascii_mode
    reset: 1
    states: [中, A]
  - name: full_shape
    states: [半角, 全角]
  - name: traditionalization
    states: [简, 繁]
engine: # 輸入引擎設定，即掛接組件的「處方」
  processors: # 一、這批組件處理各類按鍵消息
    - lua_processor@*code_processor # code mode
    - ascii_composer # ※ 處理西文模式及中西文切換
    - recognizer # ※ 與 matcher 搭配，處理符合特定規則的輸入碼，如網址、反查等
    - key_binder # ※ 在特定條件下將按鍵綁定到其他按鍵，如重定義逗號、句號爲候選翻頁鍵
    - speller # ※ 拼寫處理器，接受字符按鍵，編輯輸入碼
    - punctuator # ※ 句讀處理器，將單個字符按鍵直接映射爲文字符號
    - selector # ※ 選字處理器，處理數字選字鍵、上、下候選定位、換頁鍵
    - navigator # ※ 處理輸入欄內的光標移動鍵
    - express_editor # ※ 編輯器，處理空格、回車上屏、回退鍵等
  segmentors: # 二、這批組件識別不同內容類型，將輸入碼分段
    - ascii_segmentor # ※ 標識西文段落
    - matcher # ※ 標識符合特定規則的段落，如網址、反查等
    - abc_segmentor # ※ 標識常規的文字段落
    - punct_segmentor # ※ 標識句讀段落
    - fallback_segmentor # ※ 標識其他未標識段落
  translators: # 三、這批組件翻譯特定類型的編碼段爲一組候選文字
    - punct_translator # ※ 轉換標點符號
    - script_translator # ※ 腳本翻譯器，用於拼音等基於音節表的輸入方案
    - table_translator@melt_eng # 英文输入
  filters: # 四、這批組件過濾翻譯的結果
    - simplifier@emoji # Emoji
    - simplifier@traditionalize # 简繁切换
    # - simplifier # ※ 繁簡轉換
    - uniquifier # ※ 過濾重複的候選字，有可能來自繁簡轉換

# 拼写设定
speller:
  # 如果不想让什么标点直接上屏，可以加在 alphabet，或者编辑标点符号为两个及以上的映射
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA`/
  delimiter: " '" # 第一位<空格>是拼音之间的分隔符；第二位<'>表示可以手动输入单引号来分割拼音。
  algebra:
    - erase/^xx$/
    - derive/^([jqxy])u$/$1v/
    - derive/^([aoe])([ioun])$/$1$1$2/
    - xform/^([aoe])(ng)?$/$1$1$2/
    - xform/iu$/Ⓠ/
    - xform/(.)ei$/$1Ⓦ/
    - xform/uan$/Ⓡ/
    - xform/[uv]e$/Ⓣ/
    - xform/un$/Ⓨ/
    - xform/^sh/Ⓤ/
    - xform/^ch/Ⓘ/
    - xform/^zh/Ⓥ/
    - xform/uo$/Ⓞ/
    - xform/ie$/Ⓟ/
    - xform/(.)i?ong$/$1Ⓢ/
    - xform/ing$|uai$/Ⓚ/
    - xform/(.)ai$/$1Ⓓ/
    - xform/(.)en$/$1Ⓕ/
    - xform/(.)eng$/$1Ⓖ/
    - xform/[iu]ang$/Ⓛ/
    - xform/(.)ang$/$1Ⓗ/
    - xform/ian$/Ⓜ/
    - xform/(.)an$/$1Ⓙ/
    - xform/(.)ou$/$1Ⓩ/
    - xform/[iu]a$/Ⓧ/
    - xform/iao$/Ⓝ/
    - xform/(.)ao$/$1Ⓒ/
    - xform/ui$/Ⓥ/
    - xform/in$/Ⓑ/
    - xlit/ⓆⓌⓇⓉⓎⓊⒾⓄⓅⓈⒹⒻⒼⒽⒿⓀⓁⓏⓍⒸⓋⒷⓃⓂ/qwrtyuiopsdfghjklzxcvbnm/
    # - abbrev/^(.).+$/$1/  # 首字母简拼，开启后会导致 3 个字母时 kj'x 变成 k'jx 的问题

# 主翻译器，拼音
translator:
  dictionary: rime_ice # 挂载词库 rime_ice.dict.yaml
  prism: double_pinyin_flypy # 多方案共用一个词库时，为避免冲突，需要用 prism 指定一个名字。
  # spelling_hints: 8 # corrector.lua ：为了让错音错字提示的 Lua 同时适配全拼双拼，将拼音显示在 comment 中
  # always_show_comments: true # corrector.lua ：Rime 默认在 preedit 等于 comment 时取消显示 comment，这里强制一直显示，供 corrector.lua 做判断用。
  initial_quality: 1.2 # 拼音的权重应该比英文大
  # preedit_format: # preedit_format 影响到输入框的显示和“Shift+回车”上屏的字符
  #   - xform/([bpmfdtnljqx])n/$1iao/
  #   - xform/(\w)g/$1eng/
  #   - xform/(\w)q/$1iu/
  #   - xform/(\w)w/$1ei/
  #   - xform/([dtnlgkhjqxyvuirzcs])r/$1uan/
  #   - xform/(\w)t/$1ve/
  #   - xform/(\w)y/$1un/
  #   - xform/([dtnlgkhvuirzcs])o/$1uo/
  #   - xform/(\w)p/$1ie/
  #   - xform/([jqx])s/$1iong/
  #   - xform/(\w)s/$1ong/
  #   - xform/(\w)d/$1ai/
  #   - xform/(\w)f/$1en/
  #   - xform/(\w)h/$1ang/
  #   - xform/(\w)j/$1an/
  #   - xform/([gkhvuirzcs])k/$1uai/
  #   - xform/(\w)k/$1ing/
  #   - xform/([jqxnl])l/$1iang/
  #   - xform/(\w)l/$1uang/
  #   - xform/(\w)z/$1ou/
  #   - xform/([gkhvuirzcs])x/$1ua/
  #   - xform/(\w)x/$1ia/
  #   - xform/(\w)c/$1ao/
  #   - xform/([dtgkhvuirzcs])v/$1ui/
  #   - xform/(\w)b/$1in/
  #   - xform/(\w)m/$1ian/
  #   - xform/([aoe])\1(\w)/$1$2/
  #   - "xform/(^|[ '])v/$1zh/"
  #   - "xform/(^|[ '])i/$1ch/"
  #   - "xform/(^|[ '])u/$1sh/"
  #   - xform/([jqxy])v/$1u/
  #   - xform/([nl])v/$1ü/
  #   - xform/ü/v/ # ü 显示为 v

punctuator:
  import_preset: default
  symbols:
    '//': [/no, /go]

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "`[a-z]*'?$"
    punct: '^/([0-9A-Za-z/]+)$'

# 简繁切换
traditionalize:
  option_name: traditionalization
  opencc_config: s2t.json # s2t.json | s2hk.json | s2tw.json | s2twp.json
  tips: none # 转换提示: all 都显示 | char 仅单字显示 | none 不显示。
  tags: [abc, number, gregorian_to_lunar] # 限制在对应 tag，不对其他如反查的内容做简繁转换

  # Emoji
emoji:
  option_name: emoji
  opencc_config: emoji.json
  inherit_comment: false # 在 corrector.lua 及反查中，emoji 返回空注释

melt_eng:
  dictionary: melt_eng # 挂载词库 melt_eng.dict.yaml
  enable_sentence: false # 禁止造句
  enable_user_dict: false # 禁用用户词典
  initial_quality: 1.1 # 初始权重
  # comment_format: # 自定义提示码
  # - xform/.*// # 清空提示码
