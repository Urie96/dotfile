customCommands:
- command: lazygit-action {{.Form.Action}}
  context: files
  key: <c-o>
  output: terminal
  prompts:
  - key: Action
    type: menu
    title: Which action?
    options:
    - description: Open remote in web browser
      name: browser
      value: ''
    - description: New merge request
      name: merge request
      value: mr
    - description: Generate AI-powered commit message
      name: AI Commit
      value: ai
git:
  autoForwardBranches: none
  pagers:
  - colorArg: always
    pager: delta --dark --paging=never
gui:
  language: zh-CN
  mainPanelSplitMode: flexible
  nerdFontsVersion: '3'
  shortTimeFormat: '15:04'
  timeFormat: '2006-01-02'
keybinding:
  stash:
    popStash: p
  universal:
    nextItem-alt: ''
    nextTab: L
    prevItem-alt: ''
    prevTab: J
    scrollDownMain-alt1: ''
    scrollLeft: j
    scrollRight: l
    scrollUpMain-alt1: ''
notARepository: quit
os:
  editPreset: nvim
