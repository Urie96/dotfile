# 適用於【鼠鬚管】0.9.13+
# 位置：~/Library/Rime/squirrel.custom.yaml
# 用法：想要哪項生效，就刪去該行行首的#字符，但注意保留用於縮進的空格

patch:
  #  us_keyboard_layout: true      # 鍵盤選項：應用美式鍵盤佈局
  #  show_notifications_when: growl_is_running  # 狀態通知，默認裝有Growl時顯示，也可設爲全開（always）全關（never）
  #  style/inline_preedit: false   # 非內嵌編碼行
  #  style/font_face: "儷黑 Pro"    # 我喜歡的字體名稱
  #  style/font_point: 21          # 字號
  #  style/corner_radius: 10       # 窗口圓角半徑
  #  style/border_height: 0        # 窗口邊界高度，大於圓角半徑才有效果
  #  style/border_width: 0         # 窗口邊界寬度，大於圓角半徑才有效果
  style/color_scheme: wechat_light # 選擇配色方案
  style/color_scheme_dark: wechat_dark
  # style/font_face: Hei                  # 候选词字体（可以使用 macOS 自带的“字体册.app”检索）
  # style/font_point: 16                  # 候选词大小
  # style/label_font_face: Bradley Hand   # 候选词编号字体
  # style/label_font_size: 16             # 候选词编号大小
  style/candidate_list_layout: linear # 候選詞堆疊或平鋪顯示
  style/text_orientation: horizontal # 文字橫排或縱排
  style/horizontal: true # 候选词是否横排 !!!已弃用
  style/inline_preedit: false # true 将待转字母嵌入显示在目标程序窗口，false 将待转字母显示在输入法窗口
  style/candidate_format: '[label] [candidate] [comment]'
  app_options: # osascript -e 'id of app "Finder"
    net.kovidgoyal.kitty:
      ascii_mode: true
      vim_mode: true
      code_mode: true
    com.electron.lark:
      ascii_mode: false
    com.raycast.macos:
      ascii_mode: true
    com.microsoft.VSCode:
      ascii_mode: true
      vim_mode: true
      code_mode: true
    dev.zed.Zed:
      ascii_mode: true
      vim_mode: true
      code_mode: true
    com.tencent.xinWeChat:
      ascii_mode: false
  preset_color_schemes/wechat_light:
    name: 微信键盘浅色
    horizontal: true # true横排，false竖排
    back_color: 0xFFFFFF # 候选条背景色
    border_height: 0 # 窗口上下高度，大于圆角半径才生效
    border_width: 8 # 窗口左右宽度，大于圆角半径才生效
    comment_text_color: 0x999999 # 拼音等提示文字颜色
    corner_radius: 5 # 窗口圆角
    hilited_corner_radius: 5 # 高亮圆角
    font_face: PingFangSC # 候选词字体
    font_point: 16 # 候选字大小
    hilited_candidate_back_color: 0x75B100 # 第一候选项背景色
    hilited_candidate_text_color: 0xFFFFFF # 第一候选项文字颜色
    label_font_point: 12 # 候选编号大小
    text_color: 0x424242 # 拼音行文字颜色
    inline_preedit: true # 拼音位于： 候选框 false | 行内 true
  preset_color_schemes/wechat_dark:
    name: 微信键盘深色
    horizontal: true # true横排，false竖排
    back_color: 0x2e2925 # 候选条背景色
    border_height: 0 # 窗口上下高度，大于圆角半径才生效
    border_width: 8 # 窗口左右宽度，大于圆角半径才生效
    comment_text_color: 0x999999 # 拼音等提示文字颜色
    corner_radius: 5 # 窗口圆角
    hilited_corner_radius: 5 # 高亮圆角
    font_face: PingFangSC # 候选词字体
    font_point: 16 # 候选字大小
    hilited_candidate_back_color: 0x75B100 # 第一候选项背景色
    hilited_candidate_text_color: 0xFFFFFF # 第一候选项文字颜色
    label_font_point: 12 # 候选编号大小
    text_color: 0x424242 # 拼音行文字颜色
    label_color: 0x999999 # 预选栏编号颜色
    candidate_text_color: 0xe9e9ea # 预选项文字颜色
    inline_preedit: true # 拼音位于： 候选框 false | 行内 true
# 註：預設的配色方案及代碼（指定爲 style/color_scheme ）
#   系統默認色系 - native
#   碧水 - aqua
#   青天 - azure
#   明月 - luna
#   墨池 - ink
#   孤寺 - lost_temple
#   暗堂 - dark_temple
#   星際我爭霸 - starcraft
#   谷歌 - google
#   曬經石 - solarized_rock
#   简约白 - clean_white
# ni
