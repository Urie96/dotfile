font_family Fira Code
font_size 15

active_tab_title_template "{fmt.fg._e5c07b}{fmt.bg.default}{fmt.bg._e5c07b}{fmt.fg._7b8fe5}{str(num_windows)+' ' if num_windows>1 else ''}{fmt.fg._282c34}{bell_symbol}{title.split(' ')[0]}{fmt.fg._e5c07b}{fmt.bg.default} "
tab_title_template "{fmt.fg._5c6370}{fmt.bg.default}{fmt.bg._5c6370}{fmt.fg._d7d3cb}{str(num_windows)+' ' if num_windows>1 else ''}{fmt.fg._abb2bf}{bell_symbol}{title.split(' ')[0]}{fmt.fg._5c6370}{fmt.bg.default} "
tab_bar_edge top
tab_bar_margin_height 9 0
tab_bar_margin_width 9
tab_bar_style separator
tab_separator "" 
tab_bar_min_tabs 2

cursor_shape block
url_style dotted
bold_font auto
italic_font auto
bold_italic_font auto

enabled_layouts grid,stack
window_padding_width 0
show_hyperlink_targets yes
# draw_minimal_borders no
# window_border_width 2pt

window_title_bar_min_windows 1
window_title_bar_align left
active_window_title_template "{fmt.bg.window}{fmt.bg._a7c080}{fmt.fg._2d353b}{fmt.bg._a7c080}   {bell_symbol}{activity_symbol}{progress_percent}{title} {fmt.fg._a7c080}{fmt.bg.window}"
window_title_template "{fmt.bg.window}{fmt.bg._859289}{fmt.fg._3d484d}{fmt.bg._859289} {bell_symbol}{activity_symbol}{progress_percent}{title} {fmt.fg._859289}{fmt.bg.window}"

cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 5
