# https://sw.kovidgoyal.net/kitty/keyboard-protocol/#functional-key-definitions

clear_all_shortcuts yes

map cmd+BACKSPACE send_text all \x15
map cmd+LEFT send_text all \x1bOH
map cmd+RIGHT send_text all \x1bOF
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard

map cmd+e kitten scripts/edit_and_paste.py
map cmd+o next_layout
# map cmd+o select_tab
map cmd+f show_scrollback
scrollback_pager nvim -u NONE -R -c 'lua require("kitty+page").entry(INPUT_LINE_NUMBER, CURSOR_LINE, CURSOR_COLUMN)' -

map cmd+h kitten scripts/actions.py

map cmd+j previous_tab
map cmd+l next_tab
map cmd+o goto_tab -1

# map alt+o focus_visible_window
map alt+esc kitten scripts/select_window.py
map alt+j neighboring_window left
map alt+l neighboring_window right
map alt+i neighboring_window top
map alt+k neighboring_window bottom
map alt+shift+j move_window left
map alt+shift+l move_window right
map alt+shift+i move_window top
map alt+shift+k move_window bottom
map alt+enter toggle_layout stack
map cmd+d detach_window ask

# map cmd+p command_palette

map cmd+n launch --cwd=current
map cmd+shift+j move_tab_backward
map cmd+shift+k clear_terminal reset active
map cmd+shift+l move_tab_forward
map cmd+shift+n new_window
map cmd+t new_tab_with_cwd !neighbor
map cmd+w close_window_with_confirmation
map ctrl+shift+x scroll_to_prompt +1

map cmd+i next_tab

map cmd+k>f launch --type tab --location after pick-window
map cmd+k>v     launch --type tab --location after nvim -c 'call feedkeys("\<Space>bn")'
map cmd+k>t     launch --type tab --location after lazydeck --eval "deck.api.feedkeys('/')" /quick-access-tools
map cmd+k>a     launch --type tab --location after coding-agent-status status

mouse_map left click ungrabbed no_op
mouse_map cmd+left click grabbed,ungrabbed mouse_handle_click selection link prompt
